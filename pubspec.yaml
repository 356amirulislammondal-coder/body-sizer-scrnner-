name: body_size_scanner
description: "AI-powered body measurement scanner. No login required. On-device pose detection estimates chest, waist, hip, and more from a single full-body photo."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ---------- UI ----------
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lottie: ^3.1.2                 # splash / scanning animations
  fl_chart: ^0.68.0              # BMI gauge / measurement charts

  # ---------- State management ----------
  provider: ^6.1.2

  # ---------- Camera & Image ----------
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0                  # image decoding / cropping / resizing

  # ---------- AI / Pose Detection ----------
  google_mlkit_pose_detection: ^0.13.0   # ML Kit on-device pose landmarks (MediaPipe-based)
  tflite_flutter: ^0.11.0                # optional custom TFLite model for shape/weight refinement

  # ---------- Permissions ----------
  permission_handler: ^11.3.1

  # ---------- Local storage (no cloud, no login) ----------
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # ---------- PDF export & sharing ----------
  pdf: ^3.11.1
  printing: ^5.13.2
  share_plus: ^10.0.2

  # ---------- Utilities ----------
  intl: ^0.19.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/ml/

# ---------------------------------------------------------------------------
# NOTE ON MODEL FILES
# Place your optional custom TensorFlow Lite model (e.g. body_shape_model.tflite)
# inside assets/ml/. google_mlkit_pose_detection downloads its own bundled model
# automatically on first run — no manual TFLite file is required for pose
# detection itself.
# ---------------------------------------------------------------------------
